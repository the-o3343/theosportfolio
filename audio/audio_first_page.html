<!DOCTYPE html>


<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title> Theo Audio </title>


    <style>
        body{
            background-color: plum;
            font-size: large;
            color: beige;
            background-color: rgb(72, 52, 91);
            padding: 20px;
        }
        audio{
            padding: 15pxpx;
            margin-top: 10px;
            
        }
    </style>


    </head>

   



<body>
    
    <h1 style="text-align: center;"> Audio </h1>
    
    
    <audio controls>
        <source src="HTML audio.m4a" type="audio/mpeg">
        <track
            kind="transcript"
            srclang="en"
            label="English transcript"
        >
    </audio>
    
    <section aria-describedby="transcript-heading">
        <h2 id="transcript-heading">Transcript</h2>
        <p> This is a test, to check out my HTML tag</p>
    </section>



    <audio controls>
        <source src="mixkit-laughing-cartoon-creature-414 (1).wav" type="audio/wav">
        <track
            kind="transcript"
            srclang="en"
            label="English transcript"
        >
    </audio>
    <section aria-describedby="transcript-heading">
    <h2 id="transcript-heading">Transcript</h2>
    <p> A creepy and loud cartoon laughing sound</p>
    </section>


     <audio controls>
        <source src="good-morning.mp3" type="audio/mpeg">
        <track
            kind="transcript"
            srclang="en"
            label="English transcript"
        >
    </audio>
    <section aria-describedby="transcript-heading">
    <h2 id="transcript-heading">Transcript</h2>
    <p> Good morning </p>
    </section>



</body>
</html>
